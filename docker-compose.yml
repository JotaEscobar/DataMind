services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: analista-backend
    env_file: .env
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    ports:
      - "8000:8000"

    volumes:
      - analista_data_storage:/app/data_storage
      - analista_uploads:/app/uploads
      - analista_exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: analista-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  analista_data_storage:
  analista_uploads:
  analista_exports:
